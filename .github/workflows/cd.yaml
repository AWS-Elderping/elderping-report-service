name: CD Pipeline

on:
  workflow_run:
    workflows: [ "CI Pipeline" ]
    types:
      - completed

jobs:
  prepare:
    name: cd / prepare-report-service
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CD Initialization
        run: |
          echo "CD Pipeline triggered by CI Pipeline head branch: ${{ github.event.workflow_run.head_branch }}"
          echo "CD Pipeline triggered by CI Pipeline head sha: ${{ github.event.workflow_run.head_sha }}"

  deploy:
    name: cd / deploy-report-service
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: AWS-Elderping/elderping-gitops
          token: ${{ secrets.GITOPS_PAT }}
          ref: ${{ github.event.workflow_run.head_branch }}
          path: gitops-repo

      - name: Setup yq
        uses: mikefarah/yq@v4.44.2

      - name: Update Helm Values in GitOps
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          
          if [ "$BRANCH" = "main" ]; then
            ENV="prod"
          elif [ "$BRANCH" = "develop" ]; then
            ENV="dev"
          elif [ "$BRANCH" = "feature/test" ]; then
            ENV="stage"
          else
            echo "CD skipped: Unsupported branch $BRANCH"
            exit 0
          fi
          
          VALUES_FILE="gitops-repo/environments/$ENV/report-service-values.yaml"
          echo "Updating values file: $VALUES_FILE with tag $SHA"
          
          if [ -f "$VALUES_FILE" ]; then
            yq e -i ".image.tag = \"$SHA\"" "$VALUES_FILE"
          else
            echo "Values file not found: $VALUES_FILE"
            exit 1
          fi

      - name: Commit and Push to GitOps
        run: |
          set +e
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/
          if git diff --staged --quiet; then
            echo "No changes to deploy (image tag is already up to date)."
            exit 0
          fi
          
          git commit -m "deploy: update report-service image tag to ${{ github.event.workflow_run.head_sha }} [skip ci]"
          for i in {1..10}; do
            echo "Push attempt $i..."
            git rebase --abort || true
            git pull origin HEAD --rebase
            if [ $? -eq 0 ]; then
              git push origin HEAD
              if [ $? -eq 0 ]; then
                echo "Push successful!"
                exit 0
              fi
            fi
            echo "Push failed. Sleeping and retrying..."
            sleep $(( RANDOM % 5 + 2 ))
          done
          echo "Failed to push changes to GitOps repo after 10 attempts."
          exit 1

  notify:
    name: cd / notify-report-service
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Complete CD Notification
        run: |
          echo "CD Pipeline completed successfully: deploy successful"

